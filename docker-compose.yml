# MemoryBridge Docker Compose
# 支持开发和生产环境

version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:7.0
    container_name: memorybridge-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-memorybridge}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    networks:
      - memorybridge-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MemoryBridge 应用
  memorybridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: memorybridge-app
    environment:
      MEMORYBRIDGE_ENV: ${MEMORYBRIDGE_ENV:-development}
      DB_TYPE: ${DB_TYPE:-mongodb}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-memorybridge}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/
      MONGO_DB: ${MONGO_DB:-memorybridge}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/home/memorybridge/.memorybridge
    networks:
      - memorybridge-net
    restart: unless-stopped

  # Nginx (生产环境)
  nginx:
    image: nginx:alpine
    container_name: memorybridge-nginx
    profiles:
      - production
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - memorybridge
    networks:
      - memorybridge-net
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  memorybridge-net:
    driver: bridge
